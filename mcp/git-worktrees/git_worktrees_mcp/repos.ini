# Git worktree MCP — repository registry (INI).
#
# Add a new [REPOCODE] section with these keys (same names as branch_w.sh variables):
#   upstream        — read-only upstream clone URL (https)
#   fork_template   — your fork URL; use {gitlab_cee_user} and/or {github_user}
#   default_branch  — branch used when create_worktree_branch omits source_branch
#   default_loc     — directory name under GIT_PATH for the main fork clone
#   prefix          — worktree directory prefix (e.g. sssd-fork-)
#
# Environment GIT_WORKTREES_REPOS_INI overrides this file path.

[IDMCI]
upstream = https://gitlab.cee.redhat.com/identity-management/idm-ci.git
fork_template = git@gitlab.cee.redhat.com:{gitlab_cee_user}/idm-ci.git
default_branch = master
default_loc = idmci-fork-master
prefix = idmci-fork-

[IDMCIDOC]
upstream = https://gitlab.cee.redhat.com/identity-management/docs-idmci.git
fork_template = git@gitlab.cee.redhat.com:{gitlab_cee_user}/docs-idmci.git
default_branch = main
default_loc = idmcidoc-fork-main
prefix = idmcidoc-fork-

